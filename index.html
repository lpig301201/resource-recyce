<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>環保分類挑戰賽</title>
<style>

    :root {
      --bg1:#f5fbf8;
      --bg2:#eef7ff;
      --card:#ffffff;
      --text:#17324d;
      --muted:#587089;
      --line:#d7e4ee;
      --accent:#7c3aed;
      --accent2:#3fbf8f;
      --danger:#ff6b6b;
      --shadow:0 12px 30px rgba(28,62,95,.12);
      --radius:24px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#ecfbf3 0%,#f0f8ff 45%,#fffef4 100%);font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--text)}
    body{min-height:100vh;position:relative;overflow-x:hidden}
    body:after{
      content:"";
      position:fixed;inset:0;
      background:
        radial-gradient(circle at 12% 14%, rgba(122,230,174,.26) 0, rgba(122,230,174,0) 18%),
        radial-gradient(circle at 88% 12%, rgba(125,211,252,.24) 0, rgba(125,211,252,0) 18%),
        radial-gradient(circle at 50% 88%, rgba(253,224,71,.18) 0, rgba(253,224,71,0) 20%);
      pointer-events:none;
      z-index:0;
    }
    body:before{
      content:"☁️  ☀️  🐦      ♻️      🌳  🐰  🐻";
      position:fixed;top:14px;left:12px;right:12px;
      display:flex;justify-content:space-between;align-items:center;
      font-size:28px;opacity:.32;pointer-events:none;z-index:0;white-space:pre;
    }
    .page{max-width:900px;margin:0 auto;padding:18px 14px 28px}
    .hero{
      background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,255,255,.86));
      border:1px solid rgba(255,255,255,.8);
      box-shadow:var(--shadow);
      border-radius:32px;
      padding:18px 18px 16px;
      position:relative;
      overflow:hidden;
    }
    .hero:before{
      content:"";
      position:absolute;inset:auto -50px -50px auto;width:180px;height:180px;
      background:radial-gradient(circle,var(--accent) 0%,rgba(255,255,255,0) 70%);
      opacity:.16;
    }
    .hero:after{
      content:"🌳 ♻️ 🐦 🐶";
      position:absolute;
      left:14px;
      bottom:10px;
      font-size:22px;
      opacity:.50;
      letter-spacing:4px;
    }
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:#eef8ff;border-radius:999px;font-size:13px;font-weight:700;color:#24567a}
    h1{font-size:28px;line-height:1.2;margin:12px 0 8px}
    .subtitle{font-size:15px;line-height:1.7;color:var(--muted);margin:0}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .chip{background:#fff;border:1px solid var(--line);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:700}
    .panel{background:var(--card);border-radius:28px;box-shadow:var(--shadow);padding:16px;border:1px solid rgba(255,255,255,.9);margin-top:14px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stat{background:linear-gradient(180deg,#fff,#f7fbff);border:1px solid var(--line);border-radius:20px;padding:12px;text-align:center}
    .stat b{display:block;font-size:26px;margin-top:4px}
    .label{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.04em}
    .cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    button,.btn{
      appearance:none;border:0;border-radius:18px;padding:14px 18px;font-size:16px;font-weight:800;
      text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
      min-height:52px;
    }
    .btn-primary{background:linear-gradient(135deg,var(--accent),#38bdf8);color:#fff;box-shadow:0 10px 24px rgba(44,144,255,.25)}
    .btn-soft{background:#f5fbff;color:#24567a;border:1px solid var(--line)}
    .guide{font-size:14px;color:var(--muted);line-height:1.8}
    .footer-note{margin-top:12px;font-size:12px;color:var(--muted);line-height:1.7}
    .hidden{display:none!important}
    .center{text-align:center}
    .hint{font-size:14px;line-height:1.7;color:#31506b;background:#f8fcff;border:1px dashed #cfe2ef;border-radius:16px;padding:12px;margin-top:12px}
    .result-overlay{
      position:fixed;inset:0;background:rgba(13,29,43,.62);display:none;align-items:center;justify-content:center;
      padding:18px;z-index:999;
    }
    .result-card{
      width:min(92vw,430px);background:#fff;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.22);padding:18px;text-align:center;
    }
    .score-badge{font-size:42px;font-weight:900;color:var(--accent);margin:8px 0 2px}
    .qr-wrap{background:linear-gradient(180deg,#f7fcff,#ffffff);border:1px solid var(--line);border-radius:24px;padding:14px;margin-top:14px}
    .qr-wrap img{width:210px;max-width:72vw;border-radius:18px;background:#fff;padding:8px;border:1px solid var(--line)}
    .small{font-size:12px;color:var(--muted);line-height:1.7}
    .banner{margin-top:14px;padding:14px;border-radius:20px;background:linear-gradient(135deg,#effcf4,#f7fffb);border:1px solid #cdeedc}
    .banner h3{margin:0 0 6px;font-size:18px}
    .banner p{margin:0;color:#40615a;line-height:1.7;font-size:14px}
    @media (min-width:768px){
      .page{padding:24px 20px 40px}
      h1{font-size:34px}
    }
    
.challenge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.card{
  background:linear-gradient(180deg,#fff,#fcfbff);border:1px solid #e6dcff;border-radius:24px;padding:14px;min-height:142px;
  display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 10px 24px rgba(124,58,237,.08);
  position:relative;overflow:hidden;
}
.card:after{content:"♻️";position:absolute;right:12px;top:10px;font-size:18px;opacity:.14}
.card-name{font-size:26px;font-weight:900;line-height:1.25;position:relative;padding-left:30px}
.card-name:before{content:"🗂️";position:absolute;left:0;top:0;font-size:22px}
.card-sub{font-size:13px;color:var(--muted);margin-top:8px}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.actions button{padding:12px 6px;font-size:14px;border-radius:16px}
.actions .a1{background:linear-gradient(135deg,#34d399,#22c55e);color:#fff}
.actions .a2{background:linear-gradient(135deg,#fb923c,#f97316);color:#fff}
.actions .a3{background:linear-gradient(135deg,#fde68a,#facc15);color:#3f2f00}
.topline{display:flex;justify-content:space-between;align-items:center;gap:12px}
.batch-note{font-size:14px;color:var(--muted);line-height:1.7}
.combo{margin-top:10px;font-size:16px;font-weight:800;color:#6d28d9}

    .page{position:relative;z-index:1}
    .event-ribbon{
      margin:0 auto 12px;
      width:max-content;max-width:100%;
      background:linear-gradient(135deg,#22c55e,#38bdf8);
      color:#fff;font-weight:900;font-size:14px;letter-spacing:.04em;
      padding:10px 16px;border-radius:999px;box-shadow:0 10px 22px rgba(34,197,94,.22);
    }
    .hero{
      background:
        radial-gradient(circle at 90% 18%, rgba(255,214,10,.18) 0, rgba(255,214,10,0) 24%),
        radial-gradient(circle at 14% 82%, rgba(63,191,143,.16) 0, rgba(63,191,143,0) 24%),
        linear-gradient(135deg,rgba(255,255,255,.96),rgba(255,255,255,.88));
    }
    .hero-people{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      margin-top:12px;padding-top:10px;border-top:1px dashed #d8e7f1;
      color:#54708a;font-size:22px;opacity:.85;flex-wrap:wrap;
    }
    .hero-people span{animation:floaty 4.2s ease-in-out infinite}
    .hero-people span:nth-child(2){animation-delay:.6s}
    .hero-people span:nth-child(3){animation-delay:1.2s}
    .hero-people span:nth-child(4){animation-delay:1.8s}
    .chips:before{
      content:"一起來挑戰：分類 × 反應 × 環保知識";
      display:inline-block;background:#ffffff;border:1px dashed #cae1ee;
      padding:8px 12px;border-radius:999px;font-size:13px;color:#40627d;font-weight:800;
    }
    .panel{position:relative;overflow:hidden}
    .panel:before{
      content:"";
      position:absolute;right:-18px;top:-18px;width:80px;height:80px;
      background:radial-gradient(circle, rgba(124,58,237,.10) 0%, rgba(124,58,237,0) 70%);
      pointer-events:none;
    }
    .stats .stat:nth-child(1):before,
    .stats .stat:nth-child(2):before,
    .stats .stat:nth-child(3):before{
      display:block;font-size:20px;margin-bottom:4px;
    }
    .stats .stat:nth-child(1):before{content:"⭐"}
    .stats .stat:nth-child(2):before{content:"⏱️"}
    .stats .stat:nth-child(3):before{content:"🎯"}
    .banner{
      background:linear-gradient(135deg,#effcf4,#f7fffb);
      min-height:72px;
      position:relative;overflow:hidden;
    }
    .banner:before{
      content:"🐿️  🌱  🧒  ♻️  👧  🌳";
      position:absolute;inset:auto 12px 10px auto;
      font-size:20px;opacity:.5;
    }
    .mascot-row{
      display:flex;justify-content:center;gap:18px;flex-wrap:wrap;
      margin:14px 0 0;font-size:28px;opacity:.9;
    }
    .section-title{
      font-size:18px;font-weight:900;margin:0 0 4px;
    }
    .cta-row .btn-primary{position:relative}
    .cta-row .btn-primary:after{
      content:"✨";margin-left:2px;font-size:16px
    }
    @keyframes floaty{
      0%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
      100%{transform:translateY(0)}
    }
    @media (max-width:640px){
      .event-ribbon{font-size:12px;padding:8px 12px}
      .hero-people{font-size:20px}
      body:before{font-size:22px;top:8px}
    }

    @media (max-width:640px){ .challenge-grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="page">
  <div class="event-ribbon">♻️ 環保分類宣導活動・互動挑戰區</div>
  <section class="hero">
    <div class="eyebrow">♻️ 環保分類挑戰賽</div>
    <h1>環保分類王挑戰站<br>一起來玩分類、拿高分、學環保</h1>
    <p class="subtitle">透過遊戲學習正確分類，落實資源回收，一起守護乾淨家園與永續環境。</p>
    <div class="chips">
    </div>
    <div class="hero-people"><span>🧒</span><span>👧</span><span>🐶</span><span>🐱</span><span>🌳</span><span>♻️</span></div>
  </section>

  <section class="panel">
    <div class="stats">
      <div class="stat"><div class="label">目前分數</div><b id="scoreValue">0</b></div>
      <div class="stat"><div class="label">剩餘秒數</div><b id="timeValue">40</b></div>
      <div class="stat"><div class="label">達標進度</div><b id="progressValue">0 / 100</b></div>
    </div>
    <div class="cta-row">
      <button class="btn-primary" onclick="startGame()">開始挑戰</button>
      <button class="btn-soft" onclick="showRules()">玩法說明</button>
    </div>
    <div class="hint" id="liveHint">一起幫每個物品做正確分類，答對一個得 10 分，邊玩邊學最有趣</div>
    <div class="combo" id="comboText">連續答對：0</div>
  </section>

  <section class="panel">
    <div class="topline">
      <div>
      </div>
    </div>
    <div class="challenge-grid" id="challengeGrid"></div>
    <div class="banner"><h3 class="section-title">宣導小提醒</h3><p>看清物品材質、想想正確去向，答對越多，越能把環保知識帶回生活中！</p></div>
      <div class="mascot-row">🐻 ♻️ 🐰 🌱 🐶 ☁️</div>
  </section>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="eyebrow">🏆 挑戰結果公布</div>
    <h2 id="resultTitle">本次挑戰結束</h2>
    <div class="score-badge" id="finalScore">0</div>
    <p id="resultDesc" class="subtitle"></p>

    <div id="passBlock" class="qr-wrap hidden">
      <img id="qrImage" alt="LINE 加好友 QR Code">
      <div class="cta-row" style="justify-content:center">
        <a class="btn btn-primary" id="lineLinkBtn" href="#" target="_blank" rel="noopener">加入 LINE 好友並參加抽獎</a>
      </div>
    </div>

    <div id="retryOnly" class="small">離達標只差一點點，再挑戰一輪吧！</div>
    <div class="cta-row" style="justify-content:center">
      <button class="btn-soft" onclick="closeResult()">關閉</button>
      <button class="btn-primary" onclick="startGame()">重新挑戰</button>
    </div>
  </div>
</div>

    function updateStats() {
      const s = document.getElementById("scoreValue");
      const t = document.getElementById("timeValue");
      const p = document.getElementById("progressValue");
      if (s) s.textContent = score;
      if (t) t.textContent = timeLeft;
      if (p) p.textContent = Math.min(score, PASS_SCORE) + " / " + PASS_SCORE;
    }

    function showTip(text) {
      const el = document.getElementById("liveHint");
      if (el) el.textContent = text || "請將物品正確分類，答對一題可得 10 分。";
    }

    function startTimer(onEnd) {
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        updateStats();
        if (timeLeft <= 0) {
          clearInterval(timer);
          playing = false;
          onEnd();
        }
      }, 1000);
    }

    function startCommon() {
      score = 0;
      timeLeft = GAME_SECONDS;
      used.clear();
      playing = true;
      updateStats();
      showTip("請於 40 秒內完成分類挑戰，累積 100 分即可解鎖抽獎資訊。");
      document.getElementById("resultOverlay").style.display = "none";
      document.getElementById("lineLinkBtn").href = LINE_ADD_FRIEND_URL;
      document.getElementById("qrImage").src =
        "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" + encodeURIComponent(LINE_ADD_FRIEND_URL);
    }

    function openResult() {
      const passed = score >= PASS_SCORE;
      document.getElementById("finalScore").textContent = score;
      document.getElementById("resultTitle").textContent = passed ? "恭喜達標，解鎖抽獎資訊！" : "本次挑戰結束";
      document.getElementById("resultDesc").textContent = passed
        ? "請掃描 QR Code 或點擊按鈕加入 LINE 官方帳號，依活動流程參加抽獎。"
        : "再挑戰一次吧！累積 100 分以上即可顯示抽獎 QR Code 與加入好友按鈕。";
      document.getElementById("passBlock").classList.toggle("hidden", !passed);
      document.getElementById("retryOnly").classList.toggle("hidden", passed);
      document.getElementById("resultOverlay").style.display = "flex";
    }

    function closeResult() {
      document.getElementById("resultOverlay").style.display = "none";
    }
    </script>
    
<script>
let combo = 0;
let batch = [];

function showRules() {
  alert("玩法說明\n\n1. 開始後，畫面會同時出現 4 張物品卡\n2. 每張卡片都要按下正確分類\n3. 答對一張得 10 分，答錯會顯示說明\n4. 40 秒內累積 100 分即可解鎖抽獎資訊");
}

function updateCombo(ok) {
  combo = ok ? combo + 1 : 0;
  document.getElementById("comboText").textContent = "連續答對：" + combo;
}

function nextBatch() {
  const grid = document.getElementById("challengeGrid");
  grid.innerHTML = "";
  batch = [];
  for (let i=0;i<4;i++) {
    const item = pickItem();
    batch.push(item);
  }
  batch.forEach((item, idx) => {
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `
      <div>
        <div class="card-name">${item.name}</div>
        <div class="card-sub">請選擇正確分類方式</div>
      </div>
      <div class="actions">
        <button class="a1" data-answer="資源回收" data-idx="${idx}">♻️ 資源回收</button>
        <button class="a2" data-answer="一般垃圾" data-idx="${idx}">🗑️ 一般垃圾</button>
        <button class="a3" data-answer="廚餘" data-idx="${idx}">🍌 廚餘</button>
      </div>
    `;
    grid.appendChild(el);
  });
}

document.getElementById("challengeGrid").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-answer]");
  if (!btn || !playing) return;
  const idx = Number(btn.dataset.idx);
  const item = batch[idx];
  if (!item) return;

  const answer = btn.dataset.answer;
  const ok = answer === item.category;
  if (ok) {
    score += SCORE_PER_RIGHT;
    showTip("答對了！" + item.hint);
  } else {
    showTip("這題答錯了，正確答案是「" + item.category + "」。" + item.hint);
  }
  updateStats();
  updateCombo(ok);

  const parent = btn.closest(".card");
  parent.style.opacity = ".55";
  parent.style.pointerEvents = "none";
  parent.querySelector(".card-sub").textContent = ok ? "✔ 分類正確" : "✘ 正確答案：" + item.category;

  delete batch[idx];

  const unfinished = batch.filter(Boolean).length;
  if (unfinished === 0 && playing) {
    setTimeout(nextBatch, 380);
  }
});

function startGame() {
  startCommon();
  combo = 0;
  document.getElementById("comboText").textContent = "連續答對：0";
  nextBatch();
  startTimer(openResult);
}
</script>
</body>
</html>
